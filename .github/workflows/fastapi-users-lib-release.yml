name: fastapi-users lib release

on:
  workflow_dispatch:
  push:
    branches:
      - "master"

jobs:
  build:
    name: Build Python package for Filuta fork of FastAPI Users lib
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Install mamba
        uses: mamba-org/setup-micromamba@v1
        with:
          environment-file: environment.yml
          cache-environment: true
      - name: Build package
        env:
            ARTIFACTS_KEYRING_NONINTERACTIVE_MODE: true
            # It is really called "NUGET". That's because the Python library is just a wrapper around the
            # original .NET implementation.
            VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: '{"endpointCredentials": [{"endpoint":"https://pkgs.dev.azure.com/slavo0279/Filuta/_packaging/private-pypi/pypi/upload", "password": "${{ secrets.ADO_PYPI_PAT }}"}]}'
        run: |
          make publish
