[tox]
isolated_build = true
envlist =
    py314
    deploy
    install
    pre-commit
    security-check

[testenv:deploy]
description = run the tests with pytest
deps =
    pytest
    pytest-env
    python-dotenv[cli]
    -e .
commands = dotenv -f .env.test run -- pytest tests

[testenv:install]
description = install package and run tests
deps =
    pytest
    pytest-env
    python-dotenv[cli]
commands = dotenv -f .env.test run -- pytest tests

[testenv:pre-commit]
description = run pre-commit hooks
deps = pre-commit
commands = pre-commit run --all-files --show-diff-on-failure

[testenv:security-check]
skip_install = true
deps = pip-audit
commands = pip-audit -r pyproject.toml
